name: Migrate Urine History

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y lftp jq

      - name: Copy old storage snapshot to ISS webroot
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.SFTP_PASS }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          curl --fail --silent --show-error --location \
            https://andreasmartensson.com/api/last-urine.php \
            --output last-urine.json

          jq -e '
            type == "object"
            and (.timestamp | type == "number")
            and (.history | type == "array")
            and (has("lastValue"))
          ' last-urine.json >/dev/null

          lftp <<EOF
          set cmd:fail-exit yes
          set sftp:auto-confirm yes
          set xfer:clobber yes
          set net:max-retries 1
          set net:timeout 20
          open -u "$DEPLOY_USER","$DEPLOY_PASS" "sftp://$DEPLOY_HOST:$DEPLOY_PORT"
          cd "$DEPLOY_PATH"
          cd api/storage
          put -O . last-urine.json
          bye
          EOF
